<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#272522">
    <title>Opening Butcher Specials Hub</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background: #272522;
        color: #fff;
        font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <p id="status">Opening Butcher Specials Hub...</p>
    <script>
      const version = "20260709-3";
      fetch(`index.html?mobile=${version}`, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error("The app could not be loaded.");
          return response.text();
        })
        .then((html) => {
          const versioned = html
            .replaceAll("assets/calliope-quality-meats.png", `assets/calliope-quality-meats.png?v=${version}`)
            .replaceAll("assets/kin-kora-meats.png", `assets/kin-kora-meats.png?v=${version}`)
            .replaceAll("assets/tannum-meats.png", `assets/tannum-meats.png?v=${version}`)
            .replace('href="styles.css"', `href="styles.css?v=${version}"`)
            .replace('src="app.js"', `src="app.js?v=${version}"`);
          document.open();
          document.write(versioned);
          document.close();
        })
        .catch(() => {
          document.getElementById("status").textContent =
            "The app could not open. Check your internet connection and try this link again.";
        });
    </script>
  </body>
</html>
